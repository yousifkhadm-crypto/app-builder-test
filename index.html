<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Pro UI Builder v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #f8fafc; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* Sidebar Styling */
        .sidebar { width: 300px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; transition: all 0.3s; }
        .panel-header { padding: 15px; background: #334155; font-weight: bold; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; display: flex; justify-content: space-between; }
        
        /* Components Area */
        .comp-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 15px; overflow-y: auto; }
        .comp-item { background: #334155; padding: 12px; border-radius: 8px; cursor: grab; text-align: center; transition: 0.2s; border: 1px solid transparent; }
        .comp-item:hover { background: #2563eb; border-color: #60a5fa; transform: translateY(-2px); }
        .comp-item i { display: block; font-size: 20px; margin-bottom: 5px; }

        /* Workspace Area */
        #workspace { flex: 1; display: flex; flex-direction: column; background: #0f172a; position: relative; align-items: center; }
        .top-nav { width: 100%; height: 60px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        
        /* Device Frame */
        .device-container { flex: 1; display: flex; justify-content: center; align-items: center; width: 100%; padding: 20px; overflow: auto; }
        .phone-frame { 
            width: 375px; height: 750px; background: white; border-radius: 40px; border: 12px solid #334155;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5); position: relative; transition: 0.5s; overflow: hidden;
            display: flex; flex-direction: column;
        }
        .tablet-mode { width: 768px; height: 1024px; }
        
        .canvas { flex: 1; position: relative; overflow-y: auto; overflow-x: hidden; background: #f8fafc; }
        
        /* Selected Element Styling */
        .element-selected { outline: 2px solid #2563eb !important; outline-offset: 2px; }
        .element-item { position: absolute; min-width: 40px; min-height: 20px; cursor: move; transition: box-shadow 0.2s; }

        /* Right Panel Tabs */
        .props-content { padding: 15px; overflow-y: auto; flex: 1; }
        .prop-group { margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 15px; }
        .prop-label { font-size: 12px; color: #94a3b8; display: block; margin-bottom: 8px; }
        input[type="text"], input[type="number"], select, input[type="color"] {
            width: 100%; background: #0f172a; border: 1px solid #334155; color: white; padding: 8px; border-radius: 5px; font-size: 13px;
        }

        /* Preview Overlay */
        #preview-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:white; z-index:1000; }
        
        .btn-primary { background: #2563eb; padding: 8px 15px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .btn-success { background: #10b981; padding: 8px 15px; border-radius: 6px; font-weight: 600; cursor: pointer; }
        .btn-danger { background: #ef4444; padding: 8px 15px; border-radius: 6px; font-weight: 600; cursor: pointer; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 10px; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="panel-header">العناصر <i class="fas fa-plus-circle"></i></div>
        <div class="comp-grid">
            <div class="comp-item" draggable="true" data-type="text"><i class="fas fa-font"></i>نص</div>
            <div class="comp-item" draggable="true" data-type="button"><i class="fas fa-mouse-pointer"></i>زر</div>
            <div class="comp-item" draggable="true" data-type="image"><i class="fas fa-image"></i>صورة</div>
            <div class="comp-item" draggable="true" data-type="input"><i class="fas fa-i-cursor"></i>حقل إدخال</div>
            <div class="comp-item" draggable="true" data-type="card"><i class="fas fa-square"></i>حاوية / Card</div>
            <div class="comp-item" draggable="true" data-type="icon"><i class="fas fa-smile"></i>أيقونة</div>
            <div class="comp-item" draggable="true" data-type="video"><i class="fas fa-video"></i>فيديو</div>
            <div class="comp-item" draggable="true" data-type="list"><i class="fas fa-list"></i>قائمة</div>
        </div>
        
        <div class="panel-header">الصفحات <i class="fas fa-copy"></i></div>
        <div id="pageList" class="p-4 space-y-2">
            </div>
        <button onclick="addNewPage()" class="mx-4 mb-4 bg-emerald-600 p-2 rounded text-sm font-bold">+ إضافة صفحة جديدة</button>
    </div>

    <div id="workspace">
        <div class="top-nav">
            <div class="flex items-center gap-4">
                <span class="text-xl font-bold text-blue-400">GEMINI UI</span>
                <div class="flex bg-slate-800 rounded-lg p-1 gap-2">
                    <button onclick="setDevice('phone')" class="px-3 py-1 rounded bg-slate-700 hover:bg-slate-600"><i class="fas fa-mobile-alt"></i></button>
                    <button onclick="setDevice('tablet')" class="px-3 py-1 rounded hover:bg-slate-700"><i class="fas fa-tablet-alt"></i></button>
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="exportCode()" class="bg-slate-700 px-4 py-2 rounded text-sm hover:bg-slate-600"><i class="fas fa-code mr-2"></i>تصدير الكود</button>
                <button onclick="runPreview()" class="btn-success text-sm"><i class="fas fa-play mr-2"></i>تشغيل</button>
            </div>
        </div>

        <div class="device-container">
            <div id="phoneFrame" class="phone-frame">
                <div class="h-8 bg-white flex justify-between px-6 pt-2 text-xs font-bold text-slate-800">
                    <span>9:41</span>
                    <div class="flex gap-1">
                        <i class="fas fa-signal"></i>
                        <i class="fas fa-wifi"></i>
                        <i class="fas fa-battery-full"></i>
                    </div>
                </div>
                <div class="canvas" id="canvas">
                    </div>
            </div>
        </div>
    </div>

    <div class="sidebar" style="border-right:none; border-left:1px solid #334155;">
        <div class="panel-header">الخصائص <i class="fas fa-sliders-h"></i></div>
        <div class="props-content" id="propsPanel">
            <p class="text-slate-400 text-sm text-center mt-10">قم باختيار عنصر لتعديله</p>
        </div>
        <div class="p-4 bg-slate-800 flex gap-2">
            <button onclick="duplicateSelected()" class="flex-1 bg-blue-600 p-2 rounded text-xs">تكرار</button>
            <button onclick="deleteSelected()" class="flex-1 bg-red-600 p-2 rounded text-xs">حذف</button>
        </div>
    </div>

    <div id="preview-overlay">
        <div class="p-4 bg-slate-900 text-white flex justify-between">
            <span>معاينة التطبيق</span>
            <button onclick="closePreview()" class="text-red-400 font-bold">إغلاق X</button>
        </div>
        <iframe id="preview-iframe" class="w-full h-full border-none"></iframe>
    </div>

    <script>
        let selectedEl = null;
        let pages = { "الصفحة الرئيسية": [] };
        let activePage = "الصفحة الرئيسية";

        // --- Initialization ---
        document.addEventListener('DOMContentLoaded', () => {
            renderPageList();
            setupDropZone();
        });

        function setupDropZone() {
            const canvas = document.getElementById('canvas');
            canvas.addEventListener('dragover', (e) => e.preventDefault());
            canvas.addEventListener('drop', handleDrop);
        }

        // --- Core Logic ---
        function handleDrop(e) {
            e.preventDefault();
            const type = e.dataTransfer.getData('type');
            if (!type) return;

            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const el = document.createElement('div');
            el.className = 'element-item';
            el.style.left = x + 'px';
            el.style.top = y + 'px';
            el.dataset.type = type;
            
            // Default content based on type
            switch(type) {
                case 'text': el.innerHTML = "نص جديد"; el.style.fontSize = "16px"; break;
                case 'button': 
                    el.innerHTML = "اضغط هنا"; 
                    el.className += " bg-blue-600 text-white px-4 py-2 rounded-lg text-center";
                    break;
                case 'image':
                    el.innerHTML = `<img src="https://picsum.photos/200/150" class="w-full h-full rounded">`;
                    el.style.width = "200px";
                    break;
                case 'input':
                    el.innerHTML = `<input type="text" placeholder="أدخل بياناتك..." class="w-full p-2 border rounded">`;
                    el.style.width = "200px";
                    break;
                case 'card':
                    el.style.width = "250px";
                    el.style.height = "100px";
                    el.style.backgroundColor = "#ffffff";
                    el.style.boxShadow = "0 4px 6px -1px rgb(0 0 0 / 0.1)";
                    el.style.borderRadius = "12px";
                    el.innerHTML = "Container";
                    break;
            }

            makeElementDraggable(el);
            el.onclick = (ev) => { ev.stopPropagation(); selectElement(el); };
            canvas.appendChild(el);
            selectElement(el);
            saveState();
        }

        function makeElementDraggable(el) {
            let pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            el.onmousedown = (e) => {
                if (selectedEl !== el) selectElement(el);
                e.preventDefault();
                pos3 = e.clientX;
                pos4 = e.clientY;
                document.onmouseup = () => {
                    document.onmouseup = null;
                    document.onmousemove = null;
                    saveState();
                };
                document.onmousemove = (e) => {
                    pos1 = pos3 - e.clientX;
                    pos2 = pos4 - e.clientY;
                    pos3 = e.clientX;
                    pos4 = e.clientY;
                    el.style.top = (el.offsetTop - pos2) + "px";
                    el.style.left = (el.offsetLeft - pos1) + "px";
                };
            };
        }

        function selectElement(el) {
            if (selectedEl) selectedEl.classList.remove('element-selected');
            selectedEl = el;
            selectedEl.classList.add('element-selected');
            renderProps();
        }

        // --- UI Rendering ---
        function renderProps() {
            if (!selectedEl) return;
            const type = selectedEl.dataset.type;
            let html = `
                <div class="prop-group">
                    <span class="prop-label">العرض (Width)</span>
                    <input type="number" value="${parseInt(selectedEl.style.width) || selectedEl.offsetWidth}" oninput="updateStyle('width', this.value + 'px')">
                </div>
                <div class="prop-group">
                    <span class="prop-label">الخلفية</span>
                    <input type="color" value="${rgbToHex(selectedEl.style.backgroundColor)}" oninput="updateStyle('backgroundColor', this.value)">
                </div>
                <div class="prop-group">
                    <span class="prop-label">نص المحتوى</span>
                    <input type="text" value="${selectedEl.innerText}" oninput="updateContent(this.value)">
                </div>
                <div class="prop-group">
                    <span class="prop-label">نصف القطر (Border Radius)</span>
                    <input type="number" value="${parseInt(selectedEl.style.borderRadius) || 0}" oninput="updateStyle('borderRadius', this.value + 'px')">
                </div>
            `;

            // Unique Props for Image
            if (type === 'image') {
                html += `
                    <div class="prop-group">
                        <span class="prop-label">رابط الصورة (URL)</span>
                        <input type="text" placeholder="https://..." onchange="updateImageSrc(this.value)">
                    </div>
                `;
            }

            document.getElementById('propsPanel').innerHTML = html;
        }

        // --- Actions ---
        function updateStyle(prop, val) {
            if (selectedEl) selectedEl.style[prop] = val;
        }

        function updateContent(val) {
            if (selectedEl) {
                // Keep the image if it's an image component
                if (selectedEl.dataset.type !== 'image' && selectedEl.dataset.type !== 'input') {
                    selectedEl.innerText = val;
                }
            }
        }

        function updateImageSrc(url) {
            const img = selectedEl.querySelector('img');
            if (img) img.src = url;
        }

        function deleteSelected() {
            if (selectedEl) {
                selectedEl.remove();
                selectedEl = null;
                document.getElementById('propsPanel').innerHTML = '<p class="text-slate-400 text-sm text-center mt-10">قم باختيار عنصر لتعديله</p>';
                saveState();
            }
        }

        function duplicateSelected() {
            if (!selectedEl) return;
            const clone = selectedEl.cloneNode(true);
            clone.classList.remove('element-selected');
            clone.style.top = (parseInt(selectedEl.style.top) + 20) + "px";
            clone.style.left = (parseInt(selectedEl.style.left) + 20) + "px";
            makeElementDraggable(clone);
            clone.onclick = (ev) => { ev.stopPropagation(); selectElement(clone); };
            canvas.appendChild(clone);
            saveState();
        }

        function setDevice(mode) {
            const frame = document.getElementById('phoneFrame');
            if (mode === 'tablet') frame.classList.add('tablet-mode');
            else frame.classList.remove('tablet-mode');
        }

        // --- Export & Preview ---
        function runPreview() {
            const overlay = document.getElementById('preview-overlay');
            const iframe = document.getElementById('preview-iframe');
            overlay.style.display = 'block';
            
            // Generate basic HTML from canvas
            let cleanCanvas = canvas.cloneNode(true);
            // Remove selection boxes from preview
            cleanCanvas.querySelectorAll('.element-selected').forEach(e => e.classList.remove('element-selected'));
            
            const html = `
                <html>
                    <head>
                        <script src="https://cdn.tailwindcss.com"><\/script>
                        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
                        <style>
                            body { margin:0; padding:0; height:100vh; background:#f8fafc; overflow:auto; }
                            .element-item { position: absolute; }
                        </style>
                    </head>
                    <body>${cleanCanvas.innerHTML}</body>
                </html>
            `;
            iframe.srcdoc = html;
        }

        function closePreview() {
            document.getElementById('preview-overlay').style.display = 'none';
        }

        function exportCode() {
            const html = canvas.innerHTML;
            const blob = new Blob([html], {type: 'text/html'});
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'my-app.html';
            a.click();
        }

        // --- Helpers ---
        function rgbToHex(rgb) {
            if (!rgb || rgb === "") return "#ffffff";
            if (rgb.startsWith('#')) return rgb;
            const res = rgb.match(/\d+/g);
            return res ? "#" + res.slice(0, 3).map(x => {
                const hex = parseInt(x).toString(16);
                return hex.length == 1 ? "0" + hex : hex;
            }).join("") : "#ffffff";
        }

        function saveState() {
            // Can be implemented to save to localStorage
            console.log("State Saved...");
        }

        function addNewPage() {
            const name = prompt("اسم الصفحة الجديدة:");
            if (name) {
                pages[name] = [];
                renderPageList();
            }
        }

        function renderPageList() {
            const list = document.getElementById('pageList');
            list.innerHTML = "";
            Object.keys(pages).forEach(p => {
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-700 p-2 rounded cursor-pointer hover:bg-slate-600">
                        <span onclick="switchPage('${p}')">${p}</span>
                        <i class="fas fa-trash text-xs text-red-400" onclick="deletePage('${p}')"></i>
                    </div>
                `;
            });
        }

        document.querySelectorAll(".comp-item").forEach(item => {
            item.addEventListener("dragstart", e => {
                e.dataTransfer.setData("type", item.dataset.type);
            });
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>App Builder Prototype</title>
<style>
body {
  margin: 0;
  display: flex;
  font-family: Arial;
  background: #f0f2f5;
}

#sidebar {
  width: 220px;
  background: white;
  padding: 15px;
  box-shadow: 2px 0 10px rgba(0,0,0,0.05);
}

.draggable {
  padding: 10px;
  margin-bottom: 10px;
  background: #3b82f6;
  color: white;
  text-align: center;
  cursor: grab;
  border-radius: 6px;
}

#canvas {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.phone {
  width: 360px;
  height: 640px;
  background: white;
  border-radius: 30px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  position: relative;
  overflow: hidden;
}

.element {
  position: absolute;
  padding: 8px 12px;
  background: #f59e0b;
  color: white;
  border-radius: 6px;
  cursor: move;
}
</style>
</head>
<body>

<div id="sidebar">
  <h3>العناصر</h3>
  <div class="draggable" draggable="true" data-type="text">Text</div>
  <div class="draggable" draggable="true" data-type="button">Button</div>
</div>

<div id="canvas">
  <div class="phone" id="phone"></div>
</div>

<script>
let draggedType = null;
let selected = null;

document.querySelectorAll('.draggable').forEach(el => {
  el.addEventListener('dragstart', (e) => {
    draggedType = e.target.dataset.type;
  });
});

const phone = document.getElementById('phone');

phone.addEventListener('dragover', e => e.preventDefault());

phone.addEventListener('drop', (e) => {
  e.preventDefault();
  if (!draggedType) return;

  let el = document.createElement('div');
  el.classList.add('element');

  if (draggedType === 'text') el.textContent = "نص";
  if (draggedType === 'button') el.textContent = "زر";

  el.style.top = e.offsetY + "px";
  el.style.left = e.offsetX + "px";

  phone.appendChild(el);

  enableDrag(el);
  enableSelect(el);

  draggedType = null;
});

function enableDrag(el) {
  el.addEventListener('mousedown', function(e) {
    let shiftX = e.offsetX;
    let shiftY = e.offsetY;

    function move(e) {
      el.style.left = (e.clientX - phone.offsetLeft - shiftX) + 'px';
      el.style.top = (e.clientY - phone.offsetTop - shiftY) + 'px';
    }

    document.addEventListener('mousemove', move);

    document.addEventListener('mouseup', () => {
      document.removeEventListener('mousemove', move);
    }, { once: true });
  });
}

function enableSelect(el) {
  el.addEventListener('click', function() {
    if (selected) selected.style.outline = "none";
    selected = el;
    el.style.outline = "2px solid red";
  });
}
</script>

</body>
</html>

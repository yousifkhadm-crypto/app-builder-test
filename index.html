<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Builder Pro | الإصدار الاحترافي</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap');
        
        body { font-family: 'Cairo', sans-serif; background: #0b0f1a; color: #e2e8f0; overflow: hidden; height: 100vh; }
        
        /* Glassmorphism Sidebar */
        .sidebar { width: 280px; background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border-left: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; }
        
        .comp-card {
            background: rgba(51, 65, 85, 0.5); border: 1px solid rgba(255,255,255,0.05);
            padding: 12px; border-radius: 12px; cursor: grab; transition: all 0.3s ease;
            display: flex; flex-direction: column; align-items: center; gap: 8px; font-size: 13px;
        }
        .comp-card:hover { background: #3b82f6; transform: scale(1.05); box-shadow: 0 10px 20px rgba(0,0,0,0.3); }

        /* Canvas Area */
        #workspace { flex: 1; position: relative; display: flex; flex-direction: column; background-image: radial-gradient(#2d3748 1px, transparent 1px); background-size: 20px 20px; }
        
        .phone-frame {
            width: 380px; height: 780px; background: #ffffff; border-radius: 45px;
            border: 12px solid #1e293b; box-shadow: 0 0 50px rgba(0,0,0,0.6);
            position: relative; margin: auto; overflow: hidden; transition: 0.4s;
        }

        .canvas { width: 100%; height: 100%; position: relative; overflow-y: auto; overflow-x: hidden; }

        /* Element Styling */
        .dropped-el {
            position: absolute !important; padding: 10px; cursor: move; 
            min-width: 100px; display: flex; align-items: center; justify-content: center;
            border: 1px dashed transparent;
        }
        .dropped-el:hover { border-color: #3b82f6; }
        .selected { outline: 2px solid #3b82f6 !important; box-shadow: 0 0 15px rgba(59, 130, 246, 0.5); }

        /* Control Bars */
        .top-bar { height: 60px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; align-items: center; padding: 0 20px; gap: 20px; }
        
        input, select { background: #0f172a; border: 1px solid #334155; color: white; padding: 6px; border-radius: 6px; width: 100%; font-size: 13px; }
        
        .label-prop { font-size: 11px; color: #94a3b8; margin-top: 10px; display: block; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="flex">

    <div class="sidebar">
        <div class="p-5 font-bold text-lg border-b border-slate-700 flex justify-between items-center">
            <span>العناصر</span>
            <i class="fas fa-layer-group text-blue-500"></i>
        </div>
        <div class="grid grid-cols-2 gap-3 p-4 overflow-y-auto">
            <div class="comp-card" draggable="true" ondragstart="drag(event)" data-type="text">
                <i class="fas fa-font text-xl"></i> <span>نص</span>
            </div>
            <div class="comp-card" draggable="true" ondragstart="drag(event)" data-type="button">
                <i class="fas fa-hand-pointer text-xl"></i> <span>زر</span>
            </div>
            <div class="comp-card" draggable="true" ondragstart="drag(event)" data-type="image">
                <i class="fas fa-image text-xl"></i> <span>صورة</span>
            </div>
            <div class="comp-card" draggable="true" ondragstart="drag(event)" data-type="input">
                <i class="fas fa-keyboard text-xl"></i> <span>حقل إدخال</span>
            </div>
            <div class="comp-card" draggable="true" ondragstart="drag(event)" data-type="card">
                <i class="fas fa-window-maximize text-xl"></i> <span>حاوية</span>
            </div>
            <div class="comp-card" draggable="true" ondragstart="drag(event)" data-type="icon">
                <i class="fas fa-icons text-xl"></i> <span>أيقونة</span>
            </div>
        </div>
    </div>

    <div id="workspace">
        <div class="top-bar justify-between">
            <div class="flex gap-4">
                <button onclick="setMode('phone')" class="hover:text-blue-500"><i class="fas fa-mobile-alt"></i></button>
                <button onclick="setMode('tablet')" class="hover:text-blue-500"><i class="fas fa-tablet-alt"></i></button>
                <div class="h-6 w-px bg-slate-700 mx-2"></div>
                <button onclick="clearCanvas()" class="text-red-400 hover:text-red-300 text-sm"><i class="fas fa-trash"></i> مسح الكل</button>
            </div>
            
            <div class="flex gap-3">
                <button onclick="exportCode()" class="bg-slate-700 px-4 py-1 rounded-full text-sm hover:bg-slate-600 transition">تصدير HTML</button>
                <button onclick="togglePreview()" class="bg-blue-600 px-6 py-1 rounded-full text-sm font-bold hover:bg-blue-500 shadow-lg shadow-blue-900/20">معاينة</button>
            </div>
        </div>

        <div id="dropArea" class="flex-1 flex items-center justify-center p-10 overflow-auto" ondrop="drop(event)" ondragover="allowDrop(event)">
            <div id="phoneFrame" class="phone-frame bg-slate-50">
                <div class="h-7 bg-white flex justify-between items-center px-8 pt-2 text-[10px] font-bold text-black">
                    <span>12:30</span>
                    <div class="flex gap-1"><i class="fas fa-wifi"></i><i class="fas fa-battery-full"></i></div>
                </div>
                <div id="canvas" class="canvas"></div>
            </div>
        </div>
    </div>

    <div class="sidebar border-l border-r-0 border-slate-700">
        <div class="p-5 font-bold text-lg border-b border-slate-700">الخصائص</div>
        <div id="propertiesPanel" class="p-4 overflow-y-auto flex-1">
            <p class="text-slate-500 text-center text-sm mt-10">اختر عنصراً للتعديل عليه</p>
        </div>
        <div class="p-4 bg-slate-900/50 flex gap-2">
            <button onclick="duplicateEl()" class="flex-1 bg-slate-700 py-2 rounded-md text-xs hover:bg-slate-600">تكرار</button>
            <button onclick="deleteEl()" class="flex-1 bg-red-900/30 text-red-400 py-2 rounded-md text-xs hover:bg-red-800">حذف</button>
        </div>
    </div>

    <script>
        let selectedElement = null;

        // --- Drag & Drop Core ---
        function allowDrop(e) { e.preventDefault(); }

        function drag(e) {
            e.dataTransfer.setData("type", e.target.closest('.comp-card').dataset.type);
        }

        function drop(e) {
            e.preventDefault();
            const type = e.dataTransfer.getData("type");
            const canvas = document.getElementById('canvas');
            const rect = canvas.getBoundingClientRect();
            
            // حساب الموقع بدقة داخل الكانفس
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;

            const newEl = document.createElement('div');
            newEl.className = 'dropped-el';
            newEl.style.left = (x - 50) + 'px';
            newEl.style.top = (y - 20) + 'px';
            newEl.dataset.type = type;

            // محتوى العناصر الافتراضي
            switch(type) {
                case 'text': newEl.innerHTML = "نص جديد"; newEl.style.color = "#333"; break;
                case 'button': 
                    newEl.innerHTML = "زر أمر"; 
                    newEl.style.backgroundColor = "#3b82f6";
                    newEl.style.color = "white";
                    newEl.style.borderRadius = "8px";
                    newEl.style.padding = "10px 20px";
                    break;
                case 'image':
                    newEl.innerHTML = `<img src="https://via.placeholder.com/150" class="w-full pointer-events-none">`;
                    newEl.style.width = "150px";
                    break;
                case 'input':
                    newEl.innerHTML = `<input type="text" placeholder="أدخل شيئاً..." class="w-full pointer-events-none">`;
                    newEl.style.width = "200px";
                    break;
                case 'card':
                    newEl.style.width = "200px";
                    newEl.style.height = "100px";
                    newEl.style.background = "#fff";
                    newEl.style.boxShadow = "0 4px 10px rgba(0,0,0,0.1)";
                    newEl.style.borderRadius = "15px";
                    newEl.innerHTML = "حاوية";
                    break;
                case 'icon':
                    newEl.innerHTML = `<i class="fas fa-star text-2xl text-yellow-500"></i>`;
                    break;
            }

            // تفعيل التحريك والاختيار
            newEl.onmousedown = (ev) => startMoving(ev, newEl);
            newEl.onclick = (ev) => { ev.stopPropagation(); select(newEl); };
            
            canvas.appendChild(newEl);
            select(newEl);
        }

        // --- الحركة والاختيار ---
        function startMoving(e, el) {
            if (e.target.tagName === 'INPUT') return;
            let ox = e.clientX - el.offsetLeft;
            let oy = e.clientY - el.offsetTop;

            document.onmousemove = (e) => {
                el.style.left = (e.clientX - ox) + 'px';
                el.style.top = (e.clientY - oy) + 'px';
            };
            document.onmouseup = () => {
                document.onmousemove = null;
                document.onmouseup = null;
            };
        }

        function select(el) {
            if (selectedElement) selectedElement.classList.remove('selected');
            selectedElement = el;
            el.classList.add('selected');
            showProps(el);
        }

        // --- لوحة الخصائص المتقدمة ---
        function showProps(el) {
            const panel = document.getElementById('propertiesPanel');
            const type = el.dataset.type;
            
            let html = `
                <div class="mb-4">
                    <span class="label-prop">النص / المحتوى</span>
                    <input type="text" value="${el.innerText}" oninput="updateProp('text', this.value)">
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <div>
                        <span class="label-prop">لون الخلفية</span>
                        <input type="color" value="${rgbToHex(el.style.backgroundColor)}" oninput="updateProp('bg', this.value)">
                    </div>
                    <div>
                        <span class="label-prop">لون النص</span>
                        <input type="color" value="${rgbToHex(el.style.color)}" oninput="updateProp('color', this.value)">
                    </div>
                </div>
                <div>
                    <span class="label-prop">حجم الخط</span>
                    <input type="number" value="${parseInt(el.style.fontSize) || 16}" oninput="updateProp('fontSize', this.value + 'px')">
                </div>
                <div>
                    <span class="label-prop">انحناء الحواف</span>
                    <input type="number" value="${parseInt(el.style.borderRadius) || 0}" oninput="updateProp('radius', this.value + 'px')">
                </div>
            `;

            if(type === 'image') {
                html += `<div><span class="label-prop">رابط الصورة</span><input type="text" onchange="updateProp('src', this.value)"></div>`;
            }

            panel.innerHTML = html;
        }

        function updateProp(prop, val) {
            if (!selectedElement) return;
            if (prop === 'text') selectedElement.innerText = val;
            if (prop === 'bg') selectedElement.style.backgroundColor = val;
            if (prop === 'color') selectedElement.style.color = val;
            if (prop === 'fontSize') selectedElement.style.fontSize = val;
            if (prop === 'radius') selectedElement.style.borderRadius = val;
            if (prop === 'src') selectedElement.querySelector('img').src = val;
        }

        // --- وظائف إضافية ---
        function deleteEl() { if(selectedElement) { selectedElement.remove(); selectedElement = null; } }
        
        function duplicateEl() {
            if(!selectedElement) return;
            const clone = selectedElement.cloneNode(true);
            clone.style.top = (parseInt(selectedElement.style.top) + 20) + "px";
            clone.onmousedown = (ev) => startMoving(ev, clone);
            clone.onclick = (ev) => { ev.stopPropagation(); select(clone); };
            document.getElementById('canvas').appendChild(clone);
        }

        function clearCanvas() { if(confirm("هل أنت متأكد من مسح كافة العناصر؟")) document.getElementById('canvas').innerHTML = ""; }

        function setMode(mode) {
            const frame = document.getElementById('phoneFrame');
            frame.style.width = mode === 'phone' ? '380px' : '700px';
        }

        function rgbToHex(rgb) {
            if (!rgb || rgb.startsWith('#')) return rgb || '#ffffff';
            const res = rgb.match(/\d+/g);
            return res ? "#" + res.slice(0, 3).map(x => parseInt(x).toString(16).padStart(2, '0')).join("") : "#ffffff";
        }
    </script>
</body>
</html>

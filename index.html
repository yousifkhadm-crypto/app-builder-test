<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Ziggurat Builder</title>
<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  display: flex;
  font-family: Arial;
  background: #eef1f5;
  height: 100vh;
}

/* LEFT PANEL */
#elementsPanel {
  width: 220px;
  background: #ffffff;
  padding: 15px;
  border-right: 1px solid #ddd;
}

.panel-title {
  font-weight: bold;
  margin-bottom: 10px;
}

.draggable {
  padding: 8px;
  margin-bottom: 8px;
  background: #3b82f6;
  color: white;
  text-align: center;
  border-radius: 6px;
  cursor: grab;
}

/* CENTER CANVAS */
#canvasWrapper {
  flex: 1;
  display: flex;
  justify-content: center;
  align-items: center;
}

.phone {
  width: 360px;
  height: 700px;
  background: white;
  border-radius: 25px;
  box-shadow: 0 20px 50px rgba(0,0,0,0.2);
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
}

/* APP STRUCTURE */
.toolbar {
  height: 60px;
  background: #1e293b;
  color: white;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.content {
  flex: 1;
  display: flex;
  position: relative;
}

.sidebar {
  width: 80px;
  background: #334155;
  color: white;
  padding: 10px;
  display: flex;
  flex-direction: column;
  gap: 10px;
  cursor: pointer;
}

.main {
  flex: 1;
  position: relative;
}

/* ELEMENTS */
.element {
  padding: 8px;
  margin: 5px;
  background: #f59e0b;
  color: white;
  border-radius: 6px;
  cursor: pointer;
  position: relative;
}

.selected {
  outline: 3px solid #3b82f6;
}

/* RIGHT PANEL */
#propertiesPanel {
  width: 260px;
  background: white;
  padding: 15px;
  border-left: 1px solid #ddd;
  overflow-y: auto;
}

.property-group {
  margin-bottom: 15px;
}

.property-group label {
  font-size: 12px;
  display: block;
  margin-bottom: 4px;
}
</style>
</head>
<body>

<!-- عناصر -->
<div id="elementsPanel">
  <div class="panel-title">العناصر</div>
  <div class="draggable" draggable="true" data-type="text">Text</div>
  <div class="draggable" draggable="true" data-type="button">Button</div>
</div>

<!-- الكانفس -->
<div id="canvasWrapper">
  <div class="phone">
    <div class="toolbar element" data-type="toolbar">Toolbar</div>
    <div class="content">
      <div class="sidebar element" data-type="sidebar">Menu</div>
      <div class="main" id="mainArea"></div>
    </div>
  </div>
</div>

<!-- الخصائص -->
<div id="propertiesPanel">
  <div class="panel-title">الخصائص</div>

  <div class="property-group">
    <label>النص</label>
    <input type="text" id="propText">
  </div>

  <div class="property-group">
    <label>لون الخلفية</label>
    <input type="color" id="propBg">
  </div>

  <div class="property-group">
    <label>لون النص</label>
    <input type="color" id="propColor">
  </div>

  <div class="property-group">
    <label>العرض (px)</label>
    <input type="number" id="propWidth">
  </div>

  <div class="property-group">
    <label>الارتفاع (px)</label>
    <input type="number" id="propHeight">
  </div>

  <div class="property-group">
    <label>حجم الخط (px)</label>
    <input type="number" id="propFont">
  </div>
</div>

<script>
let selectedElement = null;

/* تحديد عنصر */
document.addEventListener("click", function(e){
  if(e.target.classList.contains("element")){
    selectElement(e.target);
  }
});

function selectElement(el){
  if(selectedElement) selectedElement.classList.remove("selected");
  selectedElement = el;
  el.classList.add("selected");

  document.getElementById("propText").value = el.innerText;
  document.getElementById("propBg").value = rgbToHex(getComputedStyle(el).backgroundColor);
  document.getElementById("propColor").value = rgbToHex(getComputedStyle(el).color);
  document.getElementById("propWidth").value = el.offsetWidth;
  document.getElementById("propHeight").value = el.offsetHeight;
  document.getElementById("propFont").value = parseInt(getComputedStyle(el).fontSize);
}

/* تحديث الخصائص */
document.getElementById("propText").oninput = e=>{
  if(selectedElement) selectedElement.innerText = e.target.value;
};

document.getElementById("propBg").oninput = e=>{
  if(selectedElement) selectedElement.style.background = e.target.value;
};

document.getElementById("propColor").oninput = e=>{
  if(selectedElement) selectedElement.style.color = e.target.value;
};

document.getElementById("propWidth").oninput = e=>{
  if(selectedElement) selectedElement.style.width = e.target.value + "px";
};

document.getElementById("propHeight").oninput = e=>{
  if(selectedElement) selectedElement.style.height = e.target.value + "px";
};

document.getElementById("propFont").oninput = e=>{
  if(selectedElement) selectedElement.style.fontSize = e.target.value + "px";
};

/* تحويل rgb إلى hex */
function rgbToHex(rgb){
  const result = rgb.match(/\d+/g);
  return "#" + result.map(x => {
    const hex = parseInt(x).toString(16);
    return hex.length == 1 ? "0" + hex : hex;
  }).join("");
}

/* Drag */
document.querySelectorAll(".draggable").forEach(item=>{
  item.addEventListener("dragstart", e=>{
    e.dataTransfer.setData("type", item.dataset.type);
  });
});

document.getElementById("mainArea").addEventListener("dragover", e=>e.preventDefault());

document.getElementById("mainArea").addEventListener("drop", e=>{
  e.preventDefault();
  const type = e.dataTransfer.getData("type");

  let el = document.createElement("div");
  el.classList.add("element");

  if(type==="text") el.innerText = "نص";
  if(type==="button") el.innerText = "زر";

  document.getElementById("mainArea").appendChild(el);
});
</script>

</body>
</html>

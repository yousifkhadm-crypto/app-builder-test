<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ziggurat Builder Pro</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
font-family:Inter,Arial;
background:#f1f5f9;
display:flex;
height:100vh;
overflow:hidden
}

/* ===== SIDEBARS ===== */
.sidebar{
width:240px;
background:#ffffff;
border-right:1px solid #e2e8f0;
padding:15px;
overflow:auto;
transition:.3s
}

#rightPanel{
border-right:none;
border-left:1px solid #e2e8f0;
}

.sidebar h3{
margin-bottom:10px;
font-size:14px
}

.comp{
padding:8px;
margin:6px 0;
background:#2563eb;
color:white;
border-radius:6px;
cursor:grab;
font-size:13px;
text-align:center
}

/* ===== CENTER ===== */
#center{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
position:relative;
}

/* Top Bar */
.topbar{
width:100%;
height:50px;
background:#0f172a;
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 15px;
}

.iconBtn{
cursor:pointer;
font-size:20px;
}

/* Phone */
.phone{
width:380px;
height:720px;
background:white;
border-radius:30px;
box-shadow:0 25px 60px rgba(0,0,0,.25);
margin-top:15px;
overflow:hidden;
display:flex;
flex-direction:column;
}

.toolbar{
height:60px;
background:#1e293b;
color:white;
display:flex;
align-items:center;
justify-content:center;
}

.main{
flex:1;
padding:10px;
overflow:auto;
}

.element{
padding:8px;
margin:6px 0;
border-radius:6px;
cursor:pointer;
}

.selected{
outline:3px solid #2563eb;
}

/* Preview Button */
#previewBtn{
position:absolute;
bottom:20px;
right:20px;
background:#2563eb;
color:white;
padding:10px 16px;
border-radius:30px;
cursor:pointer;
}

/* ===== PROPERTIES ===== */
label{font-size:12px;margin-top:10px;display:block}
input,select{
width:100%;
padding:6px;
margin-top:3px
}

/* ===== RESPONSIVE ===== */
@media(max-width:900px){
.sidebar{
position:absolute;
height:100%;
z-index:1000;
left:-250px;
top:0;
}
#rightPanel{
right:-250px;
left:auto;
}
.sidebar.active{
left:0;
}
#rightPanel.active{
right:0;
}
}
</style>
</head>
<body>

<!-- LEFT COMPONENTS -->
<div class="sidebar" id="leftPanel">
<h3>Components</h3>
<div class="comp" draggable="true" data-type="text">Text</div>
<div class="comp" draggable="true" data-type="button">Button</div>
<div class="comp" draggable="true" data-type="card">Card</div>
<div class="comp" draggable="true" data-type="image">Image</div>
</div>

<!-- CENTER -->
<div id="center">

<div class="topbar">
<span class="iconBtn" onclick="toggleLeft()">☰</span>
<span>Ziggurat Builder</span>
<span class="iconBtn" onclick="toggleRight()">⚙</span>
</div>

<div class="phone">
<div class="toolbar">App Title</div>
<div class="main" id="canvas"></div>
</div>

<div id="previewBtn" onclick="togglePreview()">Preview</div>

</div>

<!-- RIGHT PROPERTIES -->
<div class="sidebar" id="rightPanel">
<h3>Properties</h3>

<label>Text</label>
<input type="text" id="propText">

<label>Background</label>
<input type="color" id="propBg">

<label>Action</label>
<select id="propAction">
<option value="none">None</option>
<option value="alert">Show Alert</option>
<option value="link">Open Link</option>
</select>

<label>Link URL</label>
<input type="text" id="propLink">

</div>

<script>
let selected=null
let preview=false

function toggleLeft(){
leftPanel.classList.toggle("active")
}
function toggleRight(){
rightPanel.classList.toggle("active")
}

/* Drag */
document.querySelectorAll(".comp").forEach(c=>{
c.addEventListener("dragstart",e=>{
e.dataTransfer.setData("type",c.dataset.type)
})
})

canvas.addEventListener("dragover",e=>e.preventDefault())
canvas.addEventListener("drop",e=>{
e.preventDefault()
let type=e.dataTransfer.getData("type")
let el=document.createElement("div")
el.className="element"

if(type==="text"){el.innerText="Sample Text"}
if(type==="button"){el.innerText="Button";el.style.background="#2563eb";el.style.color="#fff"}
if(type==="card"){el.innerText="Card Content";el.style.background="#e2e8f0"}
if(type==="image"){el.innerHTML='<img src="https://via.placeholder.com/200" width="100%">'}

enable(el)
canvas.appendChild(el)
})

function enable(el){
el.onclick=e=>{
if(preview)return
e.stopPropagation()
if(selected)selected.classList.remove("selected")
selected=el
el.classList.add("selected")
propText.value=el.innerText
propBg.value=rgbToHex(el.style.backgroundColor)
}
}

/* Properties */
propText.oninput=e=>{
if(selected)selected.innerText=e.target.value
}

propBg.oninput=e=>{
if(selected)selected.style.background=e.target.value
}

propAction.onchange=e=>{
if(selected)selected.dataset.action=e.target.value
}

propLink.oninput=e=>{
if(selected)selected.dataset.link=e.target.value
}

/* Preview */
function togglePreview(){
preview=!preview
if(preview){
previewBtn.innerText="Back"
runActions()
}else{
previewBtn.innerText="Preview"
}
}

function runActions(){
document.querySelectorAll(".element").forEach(el=>{
el.onclick=()=>{
if(el.dataset.action==="alert"){
alert("Button Clicked")
}
if(el.dataset.action==="link"){
window.location.href=el.dataset.link
}
}
})
}

function rgbToHex(rgb){
if(!rgb)return"#ffffff"
let result=rgb.match(/\d+/g)
if(!result)return"#ffffff"
return"#"+result.slice(0,3).map(x=>{
let hex=parseInt(x).toString(16)
return hex.length==1?"0"+hex:hex
}).join("")
}
</script>

</body>
</html>

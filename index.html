<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Ziggurat Builder Pro X</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Inter,Arial;
background:#f1f5f9;
display:flex;
height:100vh;
overflow:hidden
}

/* LEFT COMPONENTS */
#components{
width:220px;
background:#ffffff;
border-right:1px solid #e2e8f0;
padding:15px;
overflow:auto
}
.comp{
padding:8px;
margin:6px 0;
background:#2563eb;
color:#fff;
border-radius:6px;
cursor:grab;
font-size:13px
}

/* CENTER */
#center{
flex:1;
display:flex;
flex-direction:column;
align-items:center;
position:relative
}

/* PAGE TABS */
#pageTabs{
width:100%;
display:flex;
align-items:center;
gap:8px;
padding:10px;
background:#ffffff;
border-bottom:1px solid #e2e8f0;
overflow-x:auto
}
.page-tab{
padding:6px 12px;
background:#e2e8f0;
border-radius:20px;
cursor:pointer;
font-size:13px
}
.page-tab.active{
background:#2563eb;
color:white
}
#addPage{
padding:6px 12px;
background:#10b981;
color:white;
border-radius:50%;
cursor:pointer
}

/* PHONE */
.phone{
width:380px;
height:720px;
background:white;
border-radius:30px;
box-shadow:0 25px 60px rgba(0,0,0,.25);
overflow:hidden;
display:flex;
flex-direction:column;
margin-top:15px
}

.toolbar{
height:60px;
background:#0f172a;
color:white;
display:flex;
align-items:center;
justify-content:center
}

.main{
flex:1;
position:relative;
overflow:auto;
padding:10px
}

.element{
padding:8px;
margin:5px 0;
border-radius:6px;
cursor:pointer
}

.selected{
outline:3px solid #2563eb
}

/* RIGHT PROPS */
#props{
width:260px;
background:white;
border-left:1px solid #e2e8f0;
padding:15px;
overflow:auto
}

label{font-size:12px;margin-top:10px;display:block}
input,select{
width:100%;
padding:6px;
margin-top:3px
}

/* PREVIEW */
#previewBtn{
position:absolute;
bottom:20px;
right:20px;
background:#2563eb;
color:white;
padding:10px 16px;
border-radius:30px;
cursor:pointer
}

.preview-mode .selected{
outline:none
}
.preview-mode .element{
cursor:default
}
</style>
</head>
<body>

<!-- COMPONENTS -->
<div id="components">
<h3>Components</h3>
<div class="comp" draggable="true" data-type="text">Text</div>
<div class="comp" draggable="true" data-type="button">Button</div>
<div class="comp" draggable="true" data-type="card">Card</div>
<div class="comp" draggable="true" data-type="image">Image</div>
</div>

<!-- CENTER -->
<div id="center">

<div id="pageTabs"></div>

<div class="phone">
<div class="toolbar">App Title</div>
<div class="main" id="canvas"></div>
</div>

<div id="previewBtn">Preview</div>

</div>

<!-- PROPERTIES -->
<div id="props">
<h3>Properties</h3>

<label>Text</label>
<input type="text" id="propText">

<label>Background</label>
<input type="color" id="propBg">

<label>Action Type</label>
<select id="propAction">
<option value="none">None</option>
<option value="goto">Go To Page</option>
<option value="timer">Auto After Time</option>
</select>

<label>Target Page ID</label>
<input type="text" id="propTarget">

<label>Time (ms)</label>
<input type="number" id="propTime">

</div>

<script>
let pages={}
let currentPage=null
let selected=null
let preview=false

function createPage(){
let id="page"+Object.keys(pages).length
pages[id]=[]
currentPage=id
renderTabs()
renderPage()
}
createPage()

function renderTabs(){
pageTabs.innerHTML=""
for(let id in pages){
let tab=document.createElement("div")
tab.className="page-tab"+(id===currentPage?" active":"")
tab.innerText=id
tab.onclick=()=>{currentPage=id;renderTabs();renderPage()}
pageTabs.appendChild(tab)
}
let add=document.createElement("div")
add.id="addPage"
add.innerText="+"
add.onclick=createPage
pageTabs.appendChild(add)
}

function renderPage(){
canvas.innerHTML=""
pages[currentPage].forEach(el=>{
canvas.appendChild(el)
})
}

document.querySelectorAll(".comp").forEach(c=>{
c.addEventListener("dragstart",e=>{
e.dataTransfer.setData("type",c.dataset.type)
})
})

canvas.addEventListener("dragover",e=>e.preventDefault())
canvas.addEventListener("drop",e=>{
e.preventDefault()
let type=e.dataTransfer.getData("type")
let el=document.createElement("div")
el.className="element"

if(type==="text"){el.innerText="Text"}
if(type==="button"){el.innerText="Button";el.style.background="#2563eb";el.style.color="#fff"}
if(type==="card"){el.innerText="Card Content";el.style.background="#f1f5f9"}
if(type==="image"){el.innerHTML='<img src="https://via.placeholder.com/200" width="100%">'}

enableElement(el)
pages[currentPage].push(el)
canvas.appendChild(el)
})

function enableElement(el){
el.onclick=e=>{
if(preview)return
e.stopPropagation()
if(selected)selected.classList.remove("selected")
selected=el
el.classList.add("selected")
propText.value=el.innerText||""
}
}

propText.oninput=e=>{
if(selected)selected.innerText=e.target.value
}

propAction.onchange=e=>{
if(selected)selected.dataset.action=e.target.value
}
propTarget.oninput=e=>{
if(selected)selected.dataset.target=e.target.value
}
propTime.oninput=e=>{
if(selected)selected.dataset.time=e.target.value
}

previewBtn.onclick=()=>{
preview=!preview
document.body.classList.toggle("preview-mode")
previewBtn.innerText=preview?"Back":"Preview"
if(preview)runActions()
}

function runActions(){
document.querySelectorAll(".element").forEach(el=>{
el.onclick=()=>{
if(el.dataset.action==="goto"){
currentPage=el.dataset.target
renderTabs()
renderPage()
}
if(el.dataset.action==="timer"){
setTimeout(()=>{
currentPage=el.dataset.target
renderTabs()
renderPage()
},parseInt(el.dataset.time||1000))
}
}
})
}
</script>

</body>
</html>
